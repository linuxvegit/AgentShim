server:
  bind: 127.0.0.1
  port: 8787
  keepalive_secs: 15
logging:
  format: pretty
  filter: info,agent_shim=debug
upstreams:
  # DeepSeek-as-backend (talks to api.deepseek.com directly):
  # Uses the native `deepseek` upstream type which adds:
  #   - `reasoning_content` interleaving for deepseek-reasoner (R1)
  #   - cache_hit / cache_miss usage mapping into the canonical Usage shape
  #   - defense-in-depth `cache_control` strip on outbound bodies
  deepseek:
    type: deepseek
    api_key: "sk-your-deepseek-api-key-here"
    # Optional overrides (defaults shown):
    # base_url: https://api.deepseek.com/v1
    # request_timeout_secs: 30
    # default_headers: {}
  # Anthropic-as-backend (talks to api.anthropic.com directly):
  # anthropic:
  #   type: anthropic
  #   api_key: "sk-ant-your-key-here"
  #   # Optional overrides:
  #   # base_url: https://api.anthropic.com
  #   # anthropic_version: "2023-06-01"
  #   # request_timeout_secs: 60
routes:
  - frontend: openai_chat
    model: deepseek-chat
    upstream: deepseek
    upstream_model: deepseek-chat
  - frontend: openai_chat
    model: deepseek-reasoner
    upstream: deepseek
    upstream_model: deepseek-reasoner
    # Optional: default reasoning_effort applied when the request omits one.
    # One of: minimal | low | medium | high | xhigh
    # Forwarded to upstreams that understand `reasoning_effort`
    # (Copilot/GPT-5/o-series).
    reasoning_effort: medium

  # Anthropic 1M context — enabled via header, NOT a different model name.
  # Claude Code sends `anthropic-beta: context-1m-...` automatically; this
  # default kicks in only if the inbound request didn't supply one.
  - frontend: anthropic_messages
    model: claude-opus-4-7
    upstream: copilot
    upstream_model: claude-opus-4-7
    anthropic_beta: context-1m-2025-08-07

  # Anthropic frontend → DeepSeek-Reasoner (visible thinking blocks).
  # DeepSeek-R1 emits `reasoning_content` deltas alongside regular
  # `content`; the parser routes both through the ReasoningInterleaver
  # so the Anthropic encoder renders reasoning as `thinking` events that
  # Claude Code displays as a "thinking" indicator.
  # - frontend: anthropic_messages
  #   model: deepseek-reasoner
  #   upstream: deepseek
  #   upstream_model: deepseek-reasoner

  # Anthropic frontend → Anthropic backend (byte-passthrough fast path)
  # - frontend: anthropic_messages
  #   model: claude-opus-4-7
  #   upstream: anthropic
  #   upstream_model: claude-opus-4-7

  # OpenAI Chat frontend → Anthropic backend (canonical translation)
  # - frontend: openai_chat
  #   model: claude-via-oai
  #   upstream: anthropic
  #   upstream_model: claude-opus-4-7
