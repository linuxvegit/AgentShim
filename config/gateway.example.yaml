server:
  bind: 127.0.0.1
  port: 8787
  keepalive_secs: 15
logging:
  format: pretty
  filter: info,agent_shim=debug
upstreams:
  deepseek:
    type: open_ai_compatible
    base_url: https://api.deepseek.com/v1
    api_key: "sk-your-deepseek-api-key-here"
    request_timeout_secs: 60
  # Anthropic-as-backend (talks to api.anthropic.com directly):
  # anthropic:
  #   type: anthropic
  #   api_key: "sk-ant-your-key-here"
  #   # Optional overrides:
  #   # base_url: https://api.anthropic.com
  #   # anthropic_version: "2023-06-01"
  #   # request_timeout_secs: 60
routes:
  - frontend: openai_chat
    model: deepseek-chat
    upstream: deepseek
    upstream_model: deepseek-chat
  - frontend: openai_chat
    model: deepseek-reasoner
    upstream: deepseek
    upstream_model: deepseek-reasoner
    # Optional: default reasoning_effort applied when the request omits one.
    # One of: minimal | low | medium | high | xhigh
    # Forwarded to upstreams that understand `reasoning_effort`
    # (Copilot/GPT-5/o-series).
    reasoning_effort: medium

  # Anthropic 1M context — enabled via header, NOT a different model name.
  # Claude Code sends `anthropic-beta: context-1m-...` automatically; this
  # default kicks in only if the inbound request didn't supply one.
  - frontend: anthropic_messages
    model: claude-opus-4-7
    upstream: copilot
    upstream_model: claude-opus-4-7
    anthropic_beta: context-1m-2025-08-07

  # Anthropic frontend → Anthropic backend (byte-passthrough fast path)
  # - frontend: anthropic_messages
  #   model: claude-opus-4-7
  #   upstream: anthropic
  #   upstream_model: claude-opus-4-7

  # OpenAI Chat frontend → Anthropic backend (canonical translation)
  # - frontend: openai_chat
  #   model: claude-via-oai
  #   upstream: anthropic
  #   upstream_model: claude-opus-4-7
